<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Skynet Cyber Café • Management</title>
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0e14;
      color: #e0f2fe;
      line-height: 1.5;
      min-height: 100vh;
    }
    :root {
      --neon-blue: #0cf;
      --neon-glow: 0 0 10px #0cf, 0 0 20px #0cf6;
      --dark-card: #11161f;
      --border-glow: 1px solid #2a3a55;
    }
    .app { max-width: 1400px; margin: 0 auto; padding: 0 1rem; }
    .cyber-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 2px solid #0cf3;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a0f0ff, #0cf);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: var(--neon-glow);
    }
    .logo p { font-size: 0.8rem; opacity: 0.8; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .nav-btn {
      background: transparent;
      border: 1px solid #2e4b6e;
      color: #b8d4ff;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .nav-btn:hover, .nav-btn.active {
      background: #0cf2;
      border-color: #0cf;
      box-shadow: 0 0 12px #0cf6;
      color: white;
    }
    .auth-area { display: flex; align-items: center; gap: 0.5rem; }
    .user-badge {
      background: #0a1a2a;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      border: 1px solid #0cf;
      font-size: 0.9rem;
    }
    .view-container { margin: 2rem 0; animation: fade 0.3s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .section-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      border-left: 6px solid #0cf;
      padding-left: 1rem;
      text-shadow: 0 0 8px #0cf5;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.2rem;
    }
    .service-card {
      background: var(--dark-card);
      border-radius: 20px;
      padding: 1.2rem 0.8rem;
      border: var(--border-glow);
      box-shadow: 0 10px 20px #00000050;
      transition: all 0.25s;
      text-align: center;
      cursor: pointer;
    }
    .service-card:hover {
      transform: translateY(-5px);
      border-color: #0cf;
      box-shadow: 0 0 22px #0cf4, 0 10px 20px #000;
    }
    .service-card i { font-size: 2.5rem; color: #0cf; margin-bottom: 0.8rem; }
    .service-card img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 0.8rem;
      border: 2px solid #0cf5;
    }
    .category-badge {
      font-size: 0.7rem;
      background: #0cf2;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      display: inline-block;
      margin-top: 0.5rem;
    }
    .form-card {
      max-width: 420px;
      margin: 0 auto;
      background: #101a24;
      padding: 2rem;
      border-radius: 30px;
      border: 1px solid #0cf6;
      box-shadow: 0 20px 30px #000;
    }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; margin-bottom: 0.3rem; font-weight: 500; }
    .input-group input, .input-group textarea {
      width: 100%;
      padding: 0.9rem 1rem;
      background: #0b1119;
      border: 1.5px solid #2a4058;
      border-radius: 40px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .input-group input:focus, .input-group textarea:focus {
      border-color: #0cf;
      box-shadow: 0 0 12px #0cf6;
    }
    .btn-primary {
      background: #0cf;
      border: none;
      color: #000;
      font-weight: 700;
      padding: 0.9rem 1.5rem;
      border-radius: 60px;
      width: 100%;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 0 18px #0cf9;
      transition: 0.2s;
    }
    .btn-primary:hover { background: #6ee4ff; transform: scale(1.02); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #0cf;
      color: #0cf;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      border-radius: 60px;
      cursor: pointer;
    }
    .chat-container {
      background: #0f1822;
      border-radius: 30px;
      border: 1px solid #0cf5;
      padding: 1.5rem;
      height: 70vh;
      display: flex;
      flex-direction: column;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .chat-message {
      background: #1a2533;
      padding: 0.8rem 1.2rem;
      border-radius: 20px;
      max-width: 80%;
      align-self: flex-start;
      border-left: 4px solid #0cf;
    }
    .chat-message .meta {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-bottom: 0.2rem;
    }
    .chat-input-area {
      display: flex;
      gap: 10px;
      margin-top: 1rem;
    }
    .chat-input-area input {
      flex: 1;
      padding: 1rem;
      background: #0b1119;
      border: 1px solid #0cf6;
      border-radius: 60px;
      color: white;
    }
    .admin-section {
      background: #0c1420;
      border-radius: 24px;
      padding: 1.8rem;
      border: 1px solid #0cf;
    }
    .flex-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    @media (max-width: 640px) {
      .logo h1 { font-size: 1.5rem; }
      .nav-btn { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0cf;
      color: #000;
      padding: 0.8rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      box-shadow: 0 0 20px #0cf;
      z-index: 9999;
    }
    .contact-footer {
      margin-top: 3rem;
      text-align: center;
      opacity: 0.7;
      font-size: 0.9rem;
      border-top: 1px solid #1e3a5a;
      padding-top: 1.5rem;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="cyber-header">
    <div class="logo">
      <h1>SKYNET CYBER</h1>
      <p>Fast • Reliable • Professional</p>
    </div>
    <div class="nav-links" id="navLinks">
      <button class="nav-btn active" data-view="home"><i class="fas fa-home"></i> Home</button>
      <button class="nav-btn" data-view="services"><i class="fas fa-cogs"></i> Services</button>
      <button class="nav-btn" data-view="chat"><i class="fas fa-comments"></i> Chat</button>
      <button class="nav-btn" data-view="login" id="loginNavBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
      <button class="nav-btn admin-only" data-view="admin" style="display:none;" id="adminNavBtn"><i class="fas fa-shield-alt"></i> Admin</button>
    </div>
    <div class="auth-area" id="authArea">
      <span id="userDisplay" class="user-badge"><i class="fas fa-user"></i> Guest</span>
      <button class="nav-btn" id="logoutBtn" style="display:none;">Logout</button>
    </div>
  </header>

  <!-- View Container -->
  <div id="viewContainer" class="view-container"></div>

  <!-- Footer Contact (always visible) -->
  <div class="contact-footer">
    <p><i class="fas fa-phone"></i> 0716630443  |  <i class="fab fa-whatsapp"></i> 0713614441  |  <i class="fas fa-envelope"></i> skynetdigitol@gmail.com</p>
    <p><i class="fas fa-map-marker-alt"></i> Opposite former Western Express Booking Office, along KAG Church</p>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  // ==================== FIREBASE CONFIG ====================
  // REPLACE THIS OBJECT WITH YOUR OWN FIREBASE CONFIG FROM CONSOLE
  const firebaseConfig = {
    apiKey: "AIzaSyBmi3a1b1CIVMiHMougekaRNG9k-O90Jh0",
    authDomain: "skynet-cyber.firebaseapp.com",
    projectId: "skynet-cyber",
    storageBucket: "skynet-cyber.firebasestorage.app",
    messagingSenderId: "972938364386",
    appId: "1:972938364386:web:dc0dccdd62571e306025bb"
  };
  // ========================================================

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { 
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
    signOut, onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
  import { 
    getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
    doc, deleteDoc, getDocs, serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import { 
    getStorage, ref, uploadBytes, getDownloadURL 
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // Global state
  let currentUser = null;
  let isAdmin = false;
  let servicesData = [];
  
  const viewContainer = document.getElementById('viewContainer');
  const navBtns = document.querySelectorAll('.nav-btn[data-view]');
  const loginNavBtn = document.getElementById('loginNavBtn');
  const adminNavBtn = document.getElementById('adminNavBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const userDisplay = document.getElementById('userDisplay');

  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  async function renderView(view) {
    navBtns.forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-view="${view}"]`)?.classList.add('active');
    switch(view) {
      case 'home': viewContainer.innerHTML = homeHTML(); break;
      case 'services': viewContainer.innerHTML = await servicesHTML(); loadServicesIntoGrid(); break;
      case 'login': viewContainer.innerHTML = loginHTML(); attachLoginEvents(); break;
      case 'admin': if (isAdmin) { viewContainer.innerHTML = adminPanelHTML(); loadAdminServiceList(); } else viewContainer.innerHTML = '<h2>Access Denied</h2>'; break;
      case 'chat': viewContainer.innerHTML = chatHTML(); initChat(); break;
      default: viewContainer.innerHTML = homeHTML();
    }
  }

  function homeHTML() {
    return `
      <div style="text-align: center; padding: 2rem 0;">
        <h2 style="font-size: 2.5rem; font-weight: 800; text-shadow: 0 0 20px #0cf;">Fast, Reliable & Professional</h2>
        <p style="font-size: 1.2rem; margin: 1rem 0 2rem;">Your one-stop digital hub in the heart of the city.</p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
          <button class="btn-primary" style="width:auto; padding:1rem 2.5rem;" onclick="document.querySelector('[data-view=\\'services\\']').click()">View Services</button>
          ${!currentUser ? '<button class="btn-outline" onclick="document.querySelector(\'[data-view=\\'login\\']\').click()">Login / Sign Up</button>' : ''}
        </div>
        <div style="margin-top: 3rem; background: #0f1a26; border-radius: 40px; padding: 2rem; border:1px solid #0cf5;">
          <h3><i class="fas fa-clock"></i> Working Hours</h3>
          <p>Mon - Sat: 7:00 AM - 9:00 PM | Sun: 10:00 AM - 6:00 PM</p>
        </div>
      </div>
    `;
  }

  async function loadServicesFromFirestore() {
    const snap = await getDocs(collection(db, 'services'));
    servicesData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  async function servicesHTML() {
    await loadServicesFromFirestore();
    let grouped = {};
    servicesData.forEach(s => { if(!grouped[s.category]) grouped[s.category] = []; grouped[s.category].push(s); });
    let html = `<h2 class="section-title"><i class="fas fa-cogs"></i> Our Services</h2>`;
    if (servicesData.length === 0) html += '<p>No services yet. Admin can add.</p>';
    for (let cat in grouped) {
      html += `<h3 style="margin:1.5rem 0 1rem; color:#a0e0ff;">${cat}</h3><div class="card-grid" id="grid-${cat.replace(/\s/g,'')}">`;
      grouped[cat].forEach(svc => {
        html += `<div class="service-card" data-service-id="${svc.id}" data-name="${svc.name}" data-desc="${svc.description || ''}">
          ${svc.imageUrl ? `<img src="${svc.imageUrl}" alt="${svc.name}">` : '<i class="fas fa-microchip"></i>'}
          <h4>${svc.name}</h4>
          <span class="category-badge">${svc.category}</span>
        </div>`;
      });
      html += '</div>';
    }
    return html;
  }

  function loadServicesIntoGrid() {
    document.querySelectorAll('.service-card').forEach(card => {
      card.addEventListener('click', () => {
        alert(`${card.dataset.name}\n${card.dataset.desc || 'Professional service at Skynet.'}`);
      });
    });
  }

  function loginHTML() {
    return `
      <div class="form-card">
        <h2 style="text-align:center; margin-bottom:1.5rem;"><i class="fas fa-user-lock"></i> Login / Sign Up</h2>
        <div id="authToggle" style="display:flex; gap:0.5rem; margin-bottom:1.5rem;">
          <button class="nav-btn active" id="showLogin">Login</button>
          <button class="nav-btn" id="showSignup">Sign Up</button>
        </div>
        <form id="authForm">
          <div class="input-group"><label>Email</label><input type="email" id="authEmail" required></div>
          <div class="input-group"><label>Password</label><input type="password" id="authPassword" required minlength="6"></div>
          <button type="submit" class="btn-primary" id="authSubmitBtn">Login</button>
        </form>
        <p id="authError" style="color:#ff7b7b; margin-top:1rem;"></p>
      </div>
    `;
  }

  function attachLoginEvents() {
    let mode = 'login';
    const showLogin = document.getElementById('showLogin');
    const showSignup = document.getElementById('showSignup');
    const form = document.getElementById('authForm');
    const submitBtn = document.getElementById('authSubmitBtn');
    const errorP = document.getElementById('authError');
    showLogin?.addEventListener('click', () => { mode='login'; submitBtn.textContent='Login'; showLogin.classList.add('active'); showSignup.classList.remove('active'); });
    showSignup?.addEventListener('click', () => { mode='signup'; submitBtn.textContent='Sign Up'; showSignup.classList.add('active'); showLogin.classList.remove('active'); });
    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const pass = document.getElementById('authPassword').value;
      try {
        if (mode === 'signup') await createUserWithEmailAndPassword(auth, email, pass);
        else await signInWithEmailAndPassword(auth, email, pass);
        toast(mode === 'signup' ? 'Account created!' : 'Logged in');
        renderView('home');
      } catch(err) { errorP.textContent = err.message; }
    });
  }

  function chatHTML() {
    return `
      <div class="chat-container">
        <h3><i class="fas fa-globe"></i> Public Cyber Chat</h3>
        <div id="chatMessages" class="chat-messages">Loading...</div>
        ${currentUser ? `
        <div class="chat-input-area">
          <input type="text" id="chatInput" placeholder="Type a message...">
          <button class="btn-primary" id="sendChatBtn" style="width:auto;"><i class="fas fa-paper-plane"></i></button>
        </div>` : '<p style="margin-top:1rem;">Please login to chat.</p>'}
      </div>
    `;
  }

  function initChat() {
    if (!currentUser) return;
    const messagesDiv = document.getElementById('chatMessages');
    const input = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChatBtn');
    const q = query(collection(db, 'chat'), orderBy('timestamp', 'asc'));
    onSnapshot(q, (snapshot) => {
      let html = '';
      snapshot.forEach(doc => {
        const d = doc.data();
        html += `<div class="chat-message"><div class="meta">${d.displayName || d.email} • ${d.timestamp?.toDate().toLocaleTimeString() || ''}</div>${d.text}</div>`;
      });
      messagesDiv.innerHTML = html || '<p>No messages yet.</p>';
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
    const send = async () => {
      const text = input.value.trim();
      if (!text) return;
      await addDoc(collection(db, 'chat'), {
        text, email: currentUser.email, displayName: currentUser.displayName || currentUser.email.split('@')[0],
        timestamp: serverTimestamp()
      });
      input.value = '';
    };
    sendBtn?.addEventListener('click', send);
    input?.addEventListener('keypress', e => { if(e.key==='Enter') send(); });
  }

  function adminPanelHTML() {
    return `
      <div class="admin-section">
        <h2><i class="fas fa-shield"></i> Admin Dashboard</h2>
        <div style="margin: 2rem 0;">
          <h3>Add New Service</h3>
          <form id="addServiceForm">
            <div class="flex-row">
              <div class="input-group"><input placeholder="Service Name" id="svcName" required></div>
              <div class="input-group"><input placeholder="Category (e.g., Cyber Services)" id="svcCat" required></div>
            </div>
            <div class="input-group"><textarea placeholder="Description" id="svcDesc" rows="2"></textarea></div>
            <div class="input-group"><input type="file" id="svcImage" accept="image/*"></div>
            <button type="submit" class="btn-primary">Add Service</button>
          </form>
        </div>
        <hr style="border-color:#0cf3; margin:2rem 0;">
        <h3>Manage Services</h3>
        <div id="adminServiceList"></div>
      </div>
    `;
  }

  async function loadAdminServiceList() {
    const listDiv = document.getElementById('adminServiceList');
    if (!listDiv) return;
    await loadServicesFromFirestore();
    let html = '';
    servicesData.forEach(s => {
      html += `<div style="background:#1a2533; padding:0.8rem; border-radius:20px; margin-bottom:0.5rem; display:flex; justify-content:space-between;">
        <span>${s.name} (${s.category})</span>
        <button class="nav-btn" data-delete="${s.id}"><i class="fas fa-trash"></i></button>
      </div>`;
    });
    listDiv.innerHTML = html || '<p>No services.</p>';
    listDiv.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if(confirm('Delete service?')) {
          await deleteDoc(doc(db, 'services', btn.dataset.delete));
          toast('Deleted');
          renderView('admin');
        }
      });
    });

    document.getElementById('addServiceForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('svcName').value;
      const cat = document.getElementById('svcCat').value;
      const desc = document.getElementById('svcDesc').value;
      const file = document.getElementById('svcImage').files[0];
      let imageUrl = '';
      if (file) {
        const storageRef = ref(storage, `services/${Date.now()}_${file.name}`);
        await uploadBytes(storageRef, file);
        imageUrl = await getDownloadURL(storageRef);
      }
      await addDoc(collection(db, 'services'), { name, category: cat, description: desc, imageUrl });
      toast('Service added');
      renderView('admin');
    });
  }

  // Navigation
  navBtns.forEach(btn => btn.addEventListener('click', e => {
    const view = btn.dataset.view;
    if (view === 'admin' && !isAdmin) { toast('Admin access required'); return; }
    if (view === 'chat' && !currentUser) { toast('Login to chat'); renderView('login'); return; }
    renderView(view);
  }));

  logoutBtn.addEventListener('click', () => { signOut(auth); toast('Logged out'); });

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    isAdmin = user?.email === 'admin@skynet.com';
    userDisplay.innerHTML = user ? `<i class="fas fa-user"></i> ${user.email}` : 'Guest';
    loginNavBtn.style.display = user ? 'none' : 'inline-block';
    logoutBtn.style.display = user ? 'inline-block' : 'none';
    adminNavBtn.style.display = isAdmin ? 'inline-block' : 'none';
    renderView('home');
  });

  // Initial render
  renderView('home');
</script>
</body>
                                                                                         </html>
